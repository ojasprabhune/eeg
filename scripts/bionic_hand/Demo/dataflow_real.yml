nodes:
  - id: hand_tracker
    build: pip install -e HandTracking
    path: HandTracking/HandTracking/data_control.py
    args: --data_file path/to/your_data.npy
    inputs:
      tick: dora/timer/millis/33
    outputs:
      - r_hand_pos


  - id: hand_simulation
    build: pip install -e AHSimulation
    path: AHSimulation/AHSimulation/mj_mink_right.py
    inputs:
      r_hand_pos: hand_tracker/r_hand_pos
      tick: dora/timer/millis/2
      tick_ctrl: dora/timer/millis/10
    outputs:
      - mj_r_joints_pos

  - id: hand_controller
    build: cargo build -p AHControl
    path: target/debug/AHControl
    args: --serialport /dev/ttyAMC0 --config AHControl/config/r_hand.toml
    inputs:
      mj_r_joints_pos: hand_simulation/mj_r_joints_pos
